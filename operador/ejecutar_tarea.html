<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MasStock Operador — Ejecutar tarea</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/operador.css">
</head>
<body class="op-exec-body">
  <main class="op-app op-exec-app">
    <header class="op-top">
      <div class="op-top-row">
        <button class="op-back-btn" onclick="goBackToList()">← Tareas</button>
        <div>
          <h1>Ejecutar tarea</h1>
          <p id="execTaskCode">TA-ALM-00000</p>
        </div>
        <button class="op-scan-mode-btn ideal" id="scanModeBtn" onclick="toggleScanMode()">Ideal</button>
      </div>
    </header>

    <section id="execTaskInfo" class="op-exec-card" style="display:none;">
      <div class="op-exec-info-grid">
        <div>
          <span class="op-task-label">NIR</span>
          <div class="op-task-value" id="execNir">—</div>
        </div>
        <div>
          <span class="op-task-label">Caja</span>
          <div class="op-task-value" id="execBox">—</div>
        </div>
      </div>
      <div style="margin-top:10px;">
        <span class="op-task-label">Ubicación destino</span>
        <div class="op-task-value" id="execLocation">—</div>
      </div>
    </section>

    <section id="execNotFound" class="card" style="display:none;">
      <div class="card-body">
        <div class="empty-state" style="padding: 24px 16px;">
          <div class="empty-state-icon warning">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-8.938 4h17.876c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L1.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
          </div>
          <h3>Tarea no encontrada</h3>
          <p>La tarea solicitada no existe o no está disponible.</p>
          <button class="op-primary-btn" style="margin-top:10px;" onclick="goBackToList()">Volver</button>
        </div>
      </div>
    </section>

    <section id="execFlow" class="op-auto-flow" style="display:none;">
      <article class="op-auto-head-card">
        <p class="op-auto-instruction" id="execInstruction">Escanea el código QR de la caja</p>
        <div class="op-auto-target" id="execTargetValue">—</div>
        <div class="op-exec-success-check" id="execSuccessCheck" style="display:none;" aria-hidden="true">
          <svg width="36" height="36" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="op-scan-error-msg" id="execScanError" style="display:none;"></div>
      </article>

      <article class="op-camera-card">
        <div class="op-camera-shell op-camera-shell-inline op-camera-tap-target" id="cameraTapTarget" onclick="handleCameraTap()">
          <video id="cameraVideo" autoplay playsinline muted></video>
          <div class="op-camera-fallback" id="cameraFallback">Simulando cámara…</div>
          <div class="op-scan-frame"></div>
          <div class="op-camera-footer">
            <div class="op-camera-title" id="cameraTitle">Escaneando caja…</div>
          </div>
        </div>
      </article>
    </section>

    <nav class="op-bottom-nav" aria-label="Navegación Operador">
      <a href="index.html" class="op-nav-item active">
        <svg class="op-nav-ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h11M8 12h11M8 17h11M4 7h.01M4 12h.01M4 17h.01"/>
        </svg>
        <span>Tareas</span>
      </a>
      <a href="#" class="op-nav-item disabled">
        <svg class="op-nav-ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 21a8 8 0 10-16 0M12 11a4 4 0 100-8 4 4 0 000 8z"/>
        </svg>
        <span>Perfil</span>
      </a>
    </nav>
  </main>

  <script src="../js/shared.js"></script>
  <script src="js/data_operador.js"></script>
  <script src="js/ejecutar_tarea.js"></script>
</body>
</html>
