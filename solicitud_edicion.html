<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasStock — Solicitudes de edición</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img class="logo-icon" src="assets/logo.png" alt="MasStock">
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section open">
        <div class="nav-section-header active" onclick="toggleSection(this)">
          <div class="nav-section-left">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            <span class="nav-label">Compras</span>
            <span class="nav-badge">2</span>
          </div>
          <svg class="nav-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <div class="nav-submenu">
          <a href="ingreso_orden.html">Ingresar</a>
          <a href="index.html">Consultar</a>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-header" onclick="toggleSection(this)">
          <div class="nav-section-left">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
            </svg>
            <span class="nav-label">Traslado</span>
            <span class="nav-badge">1</span>
          </div>
          <svg class="nav-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <div class="nav-submenu">
          <a href="#">Crear</a>
          <a href="#">Consultar</a>
        </div>
      </div>
    </nav>
  </aside>

  <!-- ===== Main ===== -->
  <div class="main">
    <header class="topbar">
      <div class="breadcrumb">
        <a href="index.html">Compras</a>
        <span>›</span>
        <a href="index.html">Consultar órdenes</a>
        <span>›</span>
        <span class="current">Solicitudes de edición</span>
      </div>
      <div class="topbar-actions">
        <div class="avatar" title="Usuario">US</div>
      </div>
    </header>

    <div class="page-content">

      <!-- Cabecera de página -->
      <div class="page-header se-page-header">
        <div class="se-page-header-info">
          <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <h1 class="se-page-title">Solicitudes de edición</h1>
            <span class="se-count-badge">
              <span class="er-panel-dot"></span>
              2 pendientes
            </span>
          </div>
          <p class="page-subtitle">Revise y apruebe o rechace las solicitudes de edición de emergencia enviadas por el equipo.</p>
        </div>
        <a href="index.html" class="se-back-btn">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          Volver a órdenes
        </a>
      </div>

      <!-- Lista de solicitudes (renderizada por JS) -->
      <div id="erList">
        <!-- Cargando... -->
      </div>

    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="seToast">
    <div class="toast-icon">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <div class="toast-content">
      <div class="toast-title">Solicitud procesada</div>
      <div class="toast-message" id="seToastMessage"></div>
    </div>
    <button class="toast-close" onclick="seHideToast()">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/solicitud_edicion.js"></script>

</body>
</html>
